<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mem-Vault Dashboard!</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">Mem-Vault Dashboard!</span>
      <span class="brand-sub">local memory dashboard</span>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder='Search observations  (press "/" to focus)' autocomplete="off" />
      <select id="type-filter">
        <option value="">all types</option>
        <option value="capture">capture</option>
        <option value="decision">decision</option>
        <option value="bugfix">bugfix</option>
        <option value="feature">feature</option>
        <option value="discovery">discovery</option>
        <option value="refactor">refactor</option>
        <option value="change">change</option>
        <option value="note">note</option>
      </select>
    </div>
    <div class="meta-right">
      <span id="count-pill" class="pill">0 observations</span>
      <span id="live-status" class="pill live-pill" title="Auto-refreshes every 30s · click to refresh now">🟢 Live · last update —</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">Projects</div>
        <ul id="project-list" class="project-list"></ul>
      </div>
      <div class="panel">
        <div class="panel-title">Stats</div>
        <div id="stats" class="stats">
          <div class="muted">Pick a project</div>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="tabs">
        <button class="tab active" data-view="list">Observations</button>
        <button class="tab" data-view="timeline">Timeline</button>
      </div>
      <div id="feed" class="feed"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
